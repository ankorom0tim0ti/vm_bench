benchmark: all
dram_limit_mb: 4096
output_dir: results

cpu:
  worker_count: 8
  rounds: 3
  iterations_per_worker: 40000000

file:
  # Set this to a directory on the real test disk in each environment.
  # Linux VM example: /var/tmp/gcl_disk_bench
  # Windows example: C:/gcl_disk_bench
  root_dir: C:/gcl_disk_bench
  reject_memory_filesystems: true
  worker_count: 8
  rounds: 3
  files_per_worker: 2000
  file_size_bytes: 4096
  read_repeats: 2
  fsync_each_file: true
  cleanup: true
